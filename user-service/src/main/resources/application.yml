spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/backend_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 1. clean 기능을 활성화 (Spring Boot 3.x부터는 기본적으로 비활성 상태)
    baseline-on-migrate: true
  jackson:
    property-naming-strategy: SNAKE_CASE

jwt:
  issuer: blog-josik-collector  # 토큰 발행자 식별자
  # HS512 알고리즘을 안전하게 사용하기 위해 최소 64글자 이상의 임의 문자열 권장
  # 아래는 Base64 인코딩된 예시 키입니다. (실제 운영시에는 강력한 키로 생성하세요)
  client-secret: dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLWtleS1mb3Itand0LXNpZ25pbmctNTEyLWJpdHMtc3Ryb25nLWVub3VnaA==
  expiry-seconds: 7200  # 액세스 토큰 만료 시간 (2시간 = 7200초)

springdoc:
  api-docs:
    path: /users/v3/api-docs
  swagger-ui:
    path: /users/swagger-ui

# Google OAuth2(authorization code → token 교환용)
google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: http://localhost:8080/auth/v1/oauth/google/callback